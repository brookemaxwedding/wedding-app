name: Deploy to GitHub Pages

# Builds the Vite site and publishes ./dist to GitHub Pages on every push to
# main. No secrets or API keys needed — it's a fully static build.
#
# One-time setup: in the repo, go to Settings → Pages → "Build and deployment"
# → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Add these under Settings → Secrets and variables → Actions.
          VITE_SHEET_URL: ${{ secrets.VITE_SHEET_URL }}
          VITE_SHEET_TOKEN: ${{ secrets.VITE_SHEET_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
